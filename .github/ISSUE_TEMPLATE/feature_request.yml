name: Feature request
description: Propose a new capability or a change to existing behavior.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The gap or friction you're hitting, not the proposed API — start with the "why."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How you'd imagine this working, if you have a preference. Sketch code is welcome.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds, or other designs you weighed.
